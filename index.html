<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Level Selection</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0b0d10">
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS / Apple Web App Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Game Map">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #0b0d10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Modern dynamic viewport height */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 0;
            margin: 0;
        }

        /* Fullscreen Loading Screen with Fantasy Theme */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background-color: #0b0d10;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
        }

        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        /* Stylized Game Title Logo */
        .game-logo {
            font-size: 2rem;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(255, 140, 0, 0.3);
            font-family: Georgia, serif;
            font-weight: bold;
            animation: logoPulse 2.5s ease-in-out infinite alternate;
        }

        @keyframes logoPulse {
            0% {
                transform: scale(0.98);
                text-shadow: 0 0 10px rgba(255, 215, 0, 0.4), 0 0 20px rgba(255, 140, 0, 0.2);
            }
            100% {
                transform: scale(1.02);
                text-shadow: 0 0 15px rgba(255, 215, 0, 0.7), 0 0 30px rgba(255, 140, 0, 0.5);
            }
        }

        /* Spinner Container */
        .spinner-container {
            position: relative;
            width: 70px;
            height: 70px;
            margin-bottom: 1.5rem;
        }

        /* Golden Fantasy Spinner */
        .fantasy-spinner {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 215, 0, 0.15);
            border-top-color: #ffd700;
            border-bottom-color: #ffd700;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading Label and Percentage */
        .loading-text-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            color: #e0e4eb;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            font-family: monospace, sans-serif;
        }

        .loading-label {
            font-weight: 300;
        }

        .loading-percentage {
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        /* Progress Bar Container */
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        /* Progress Bar Active Fill */
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            background-size: 200% 100%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            border-radius: 3px;
            transition: width 0.1s linear;
            animation: progressGlow 1.5s linear infinite;
        }

        @keyframes progressGlow {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        /* Scalable Main Game Wrapper */
        .game-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Modern dynamic viewport height */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none; /* Disables standard browser zooming/panning */
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Container with standard shadows on desktop, customized on mobile */
        .map-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            border-radius: 8px;
            overflow: visible;
            transform-origin: center center;
            will-change: transform;
            transform-style: preserve-3d;
        }

        /* Remove border-radius and shadows on mobile for an edge-to-edge finish */
        @media (max-width: 768px) {
            .map-container {
                border-radius: 0;
                box-shadow: none;
            }
        }

        /* The map artwork layout */
        .map-bg {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Overlay for interactive buttons */
        .interactive-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
        }

        /* Mission Badge Layer */
        .mission-badge {
            position: absolute;
            width: 9.3%; 
            aspect-ratio: 1 / 1;
            transform: translate3d(-50%, -50%, 0) scale(1);
            transform-origin: center center;
            cursor: pointer;
            pointer-events: auto;
            touch-action: manipulation;
            overflow: visible; 
            opacity: 1;
            
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
            will-change: transform;
            
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        filter 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Image inside badge */
        .badge-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* Hover Behavior (Desktop Only) */
        @media (hover: hover) {
            .mission-badge:hover {
                transform: translate3d(-50%, calc(-50% - 2px), 0) scale(1.05);
                filter: drop-shadow(0 4px 12px rgba(255, 215, 0, 0.6)) brightness(1.08);
            }
        }

        /* Active Sequence (Pop & Glow Bounce) */
        .mission-badge.clicked {
            pointer-events: none;
            animation: badgeBounceAndGlow 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }

        @keyframes badgeBounceAndGlow {
            0% {
                transform: translate3d(-50%, calc(-50% - 2px), 0) scale(1.05);
                filter: drop-shadow(0 4px 12px rgba(255, 215, 0, 0.6)) brightness(1.08);
            }
            40% {
                transform: translate3d(-50%, -50%, 0) scale(1.10); 
                filter: drop-shadow(0 6px 20px rgba(255, 215, 0, 0.85)) brightness(1.15);
            }
            100% {
                transform: translate3d(-50%, -50%, 0) scale(1.10);
                filter: drop-shadow(0 5px 16px rgba(255, 215, 0, 0.75)) brightness(1.10);
            }
        }

        /* Shine Sweep Overlay */
        .mission-badge::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(
                115deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.25) 30%,
                rgba(255, 223, 0, 0.85) 50%,
                rgba(255, 255, 255, 0.25) 70%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 300% 100%;
            background-position: 150% 0;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: color-dodge;
            transition: opacity 0.2s ease;
        }

        .mission-badge.clicked::after {
            opacity: 1;
            animation: shineSweep 0.4s ease-out forwards;
        }

        @keyframes shineSweep {
            0% {
                background-position: 150% 0;
            }
            100% {
                background-position: -150% 0;
            }
        }

        /* Transparent Hotspots */
        .ui-button {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            touch-action: manipulation;
            background: transparent;
            border: none;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- Fantasy-themed Fullscreen Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <h1 class="game-logo">选择你的任务</h1>
            <div class="spinner-container">
                <div class="fantasy-spinner"></div>
            </div>
            <div class="loading-text-container">
                <span class="loading-label">Loading</span>
                <span class="loading-percentage" id="loadingPercentage">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>
    </div>

    <!-- Main Game Viewport -->
    <div class="game-wrapper" id="gameViewport">
        <div class="map-container" id="mapLayer">
            <!-- Background Map Image (Source resolved programmatically) -->
            <img alt="Game Selection Map" class="map-bg" id="mapImage">
            
            <!-- Dynamic Interactive Overlays Layer -->
            <div class="interactive-overlay" id="interactiveOverlay">
                <!-- UI Buttons (Invisible pointer hotspots) -->
                <div class="ui-button" id="btn-menu" style="left: 7.3%; top: 4.8%; width: 9%; height: 9%; border-radius: 50%;"></div>
                <div class="ui-button" id="btn-achievement" style="left: 92.7%; top: 4.8%; width: 9%; height: 9%; border-radius: 50%;"></div>
            </div>
        </div>
    </div>

    <script>
        // Clean configuration array for independent PNG badges
        const BADGES = [
            { id: 1, image: 'badge1.png', x: 50.0, y: 86.6, level: 'level1.html' },
            { id: 2, image: 'badge2.png', x: 50.0, y: 70.8, level: 'level2.html' },
            { id: 3, image: 'badge3.png', x: 69.2, y: 59.8, level: 'level3.html' },
            { id: 4, image: 'badge4.png', x: 27.4, y: 60.1, level: 'level4.html' },
            { id: 5, image: 'badge5.png', x: 50.0, y: 40.8, level: 'level5.html' },
            { id: 6, image: 'badge6.png', x: 14.5, y: 41.5, level: 'level6.html' },
            { id: 7, image: 'badge7.png', x: 84.1, y: 41.5, level: 'level7.html' },
            { id: 8, image: 'badge8.png', x: 79.7, y: 19.4, level: 'level8.html' },
            { id: 9, image: 'badge9.png', x: 20.3, y: 19.4, level: 'level9.html' }
        ];

        // Combined Assets list for Promise-based Preloading
        const ASSETS = [
            'map.png',
            'badge1.png',
            'badge2.png',
            'badge3.png',
            'badge4.png',
            'badge5.png',
            'badge6.png',
            'badge7.png',
            'badge8.png',
            'badge9.png'
        ];

        // Web Audio Synthesizer (magical ding effect)
        function playClickSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); 
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } catch (e) {
                console.warn("AudioContext blocked or unsupported.", e);
            }
        }

        // --- CAMERA STATE ENGINE ---
        const viewport = document.getElementById('gameViewport');
        const mapContainer = document.getElementById('mapLayer');
        const mapImage = document.getElementById('mapImage');

        // Independent, decoupled camera target variables
        let targetCameraScale = 1.0;
        let targetCameraX = 0;
        let targetCameraY = 0;

        // Current rendered camera variables
        let currentCameraScale = 1.0;
        let currentCameraX = 0;
        let currentCameraY = 0;

        // Inertia state variables
        let vx = 0;
        let vy = 0;
        let lastPointerX = 0;
        let lastPointerY = 0;
        let lastPointerTime = 0;

        // Pointer tracking lists
        let activePointers = [];
        let isPointerDown = false;
        let startX = 0;
        let startY = 0;
        let startTargetCameraX = 0;
        let startTargetCameraY = 0;
        let dragExceeded = false; // Evaluated true if pointer movement > 8px

        // Tap selection targets
        let pressedBadge = null;
        let pressedUIButton = null;

        // Pinch-zoom tracking
        let initialPinchDist = 0;
        let initialPinchScale = 1.0;
        let pinchCenterX = 0;
        let pinchCenterY = 0;

        // Viewport and container dimensions
        let viewW = viewport.clientWidth;
        let viewH = viewport.clientHeight;
        let mapW = 0;
        let mapH = 0;

        // Tracker for primary initialization
        let isInitialLoad = true;

        // Set default camera position
        function setInitialCamera() {
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                // Cover mode naturally overflows. Set zoom to 1.25 on load
                targetCameraScale = 1.25;
                
                const scaledH = mapH * targetCameraScale;
                const limitY = Math.max(0, (scaledH - viewH) / 2);
                
                // Position camera proportionally higher so the top layout aligns exactly with viewport top.
                // Moving +limitY slides the container down, bringing the header banner and top buttons directly into view.
                targetCameraY = limitY;
                targetCameraX = 0;
            } else {
                targetCameraScale = 1.0;
                targetCameraX = 0;
                targetCameraY = 0;
            }

            if (isInitialLoad) {
                currentCameraScale = targetCameraScale;
                currentCameraX = targetCameraX;
                currentCameraY = targetCameraY;
                isInitialLoad = false;
            }
            
            clampBounds();
        }

        // Dynamic, proportional aspect ratio resolution
        function updateMapDimensions() {
            viewW = viewport.clientWidth;
            viewH = viewport.clientHeight;

            const mapAspectRatio = 1000 / 1482; // Native aspect ratio of map.png
            const viewAspectRatio = viewW / viewH;

            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                // Cover Logic: Scale map up to completely fill screen with zero empty borders
                if (viewAspectRatio > mapAspectRatio) {
                    mapW = viewW;
                    mapH = viewW / mapAspectRatio;
                } else {
                    mapH = viewH;
                    mapW = viewH * mapAspectRatio;
                }
            } else {
                // Contain Logic: Keep entire map perfectly visible on desktop
                if (viewAspectRatio > mapAspectRatio) {
                    mapH = viewH;
                    mapW = viewH * mapAspectRatio;
                } else {
                    mapW = viewW;
                    mapH = viewW / mapAspectRatio;
                }
            }

            mapContainer.style.width = `${mapW}px`;
            mapContainer.style.height = `${mapH}px`;

            if (isInitialLoad) {
                setInitialCamera();
            } else {
                clampBounds();
            }
        }

        // Track screen sizing changes safely
        let lastWidth = window.innerWidth;
        let lastHeight = window.innerHeight;

        function handleResize() {
            const currentWidth = window.innerWidth;
            const currentHeight = window.innerHeight;
            
            // Re-render layout only if boundaries shift significantly (avoids address bar jitter)
            if (Math.abs(currentWidth - lastWidth) > 5 || Math.abs(currentHeight - lastHeight) > 15) {
                lastWidth = currentWidth;
                lastHeight = currentHeight;
                updateMapDimensions();
            }
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => {
            setTimeout(updateMapDimensions, 150); // Settle browser UI transition
        });

        // Easing interpolation
        const lerp = (start, end, amt) => (1 - amt) * start + amt * end;

        // Camera bounding clamp algorithm
        function clampBounds() {
            if (mapW === 0 || mapH === 0) return;

            const scaledW = mapW * targetCameraScale;
            const scaledH = mapH * targetCameraScale;

            const limitX = Math.max(0, (scaledW - viewW) / 2);
            const limitY = Math.max(0, (scaledH - viewH) / 2);

            if (scaledW <= viewW) {
                targetCameraX = 0;
            } else {
                targetCameraX = Math.max(-limitX, Math.min(limitX, targetCameraX));
            }

            if (scaledH <= viewH) {
                targetCameraY = 0;
            } else {
                targetCameraY = Math.max(-limitY, Math.min(limitY, targetCameraY));
            }
        }

        // Zoom function
        function zoomToPoint(zoomCenterViewportX, zoomCenterViewportY, newScale) {
            newScale = Math.max(1.0, Math.min(2.0, newScale));
            if (newScale === targetCameraScale) return;

            const px = zoomCenterViewportX - viewW / 2;
            const py = zoomCenterViewportY - viewH / 2;

            const scaleRatio = newScale / targetCameraScale;
            targetCameraX = px - (px - targetCameraX) * scaleRatio;
            targetCameraY = py - (py - targetCameraY) * scaleRatio;
            targetCameraScale = newScale;

            clampBounds();
        }

        // --- POINTER EVENTS SYSTEM ---
        viewport.addEventListener('pointerdown', (e) => {
            pressedBadge = e.target.closest('.mission-badge');
            pressedUIButton = e.target.closest('.ui-button');

            activePointers.push(e);
            isPointerDown = true;
            vx = 0; 
            vy = 0;

            if (activePointers.length === 1) {
                startX = e.clientX;
                startY = e.clientY;
                startTargetCameraX = targetCameraX;
                startTargetCameraY = targetCameraY;
                dragExceeded = false;

                lastPointerX = e.clientX;
                lastPointerY = e.clientY;
                lastPointerTime = performance.now();
            } else if (activePointers.length === 2) {
                pressedBadge = null;
                pressedUIButton = null;
                dragExceeded = true;

                const p1 = activePointers[0];
                const p2 = activePointers[1];
                initialPinchDist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                initialPinchScale = targetCameraScale;
                pinchCenterX = (p1.clientX + p2.clientX) / 2;
                pinchCenterY = (p1.clientY + p2.clientY) / 2;
            }
            viewport.setPointerCapture(e.pointerId);
        });

        viewport.addEventListener('pointermove', (e) => {
            const idx = activePointers.findIndex(p => p.pointerId === e.pointerId);
            if (idx !== -1) {
                activePointers[idx] = e;
            }

            if (!isPointerDown) return;

            if (activePointers.length === 1) {
                const p = activePointers[0];
                const dx = p.clientX - startX;
                const dy = p.clientY - startY;

                if (Math.hypot(p.clientX - startX, p.clientY - startY) > 8) {
                    dragExceeded = true;
                }

                if (dragExceeded) {
                    const scaledW = mapW * targetCameraScale;
                    const scaledH = mapH * targetCameraScale;

                    // Allow panning if dimensions exceed current viewport boundary
                    if (scaledW > viewW || scaledH > viewH) {
                        targetCameraX = startTargetCameraX + dx;
                        targetCameraY = startTargetCameraY + dy;
                        clampBounds();

                        const now = performance.now();
                        const dt = now - lastPointerTime;
                        if (dt > 0) {
                            vx = (p.clientX - lastPointerX) / dt;
                            vy = (p.clientY - lastPointerY) / dt;
                        }
                        lastPointerX = p.clientX;
                        lastPointerY = p.clientY;
                        lastPointerTime = now;
                    } else {
                        vx = 0;
                        vy = 0;
                    }
                }
            } else if (activePointers.length === 2) {
                dragExceeded = true; 
                const p1 = activePointers[0];
                const p2 = activePointers[1];
                const currentDist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                const scaleFactor = currentDist / initialPinchDist;
                
                const nextScale = initialPinchScale * scaleFactor;
                const midX = (p1.clientX + p2.clientX) / 2;
                const midY = (p1.clientY + p2.clientY) / 2;
                
                zoomToPoint(midX, midY, nextScale);
            }
        });

        const handlePointerUp = (e) => {
            const idx = activePointers.findIndex(p => p.pointerId === e.pointerId);
            if (idx !== -1) {
                activePointers.splice(idx, 1);
            }

            if (activePointers.length === 0) {
                isPointerDown = false;
                
                if (!dragExceeded) {
                    vx = 0;
                    vy = 0;

                    if (pressedBadge) {
                        const badgeId = pressedBadge.getAttribute('data-level');
                        const badgeData = BADGES.find(b => b.id == badgeId);

                        if (badgeData && !pressedBadge.classList.contains('clicked')) {
                            pressedBadge.classList.add('clicked');
                            playClickSound();

                            setTimeout(() => {
                                window.location.href = badgeData.level;
                            }, 400);
                        }
                    } else if (pressedUIButton) {
                        const buttonId = pressedUIButton.id;
                        playClickSound();
                        setTimeout(() => {
                            if (buttonId === 'btn-menu') {
                                alert("Menu Pressed");
                            } else if (buttonId === 'btn-achievement') {
                                alert("Achievements Pressed");
                            }
                        }, 100);
                    }
                } else {
                    const maxSpeed = 1.5;
                    vx = Math.max(-maxSpeed, Math.min(maxSpeed, vx));
                    vy = Math.max(-maxSpeed, Math.min(maxSpeed, vy));
                }

                pressedBadge = null;
                pressedUIButton = null;

            } else if (activePointers.length === 1) {
                const p = activePointers[0];
                startX = p.clientX;
                startY = p.clientY;
                startTargetCameraX = targetCameraX;
                startTargetCameraY = targetCameraY;
                lastPointerX = p.clientX;
                lastPointerY = p.clientY;
                lastPointerTime = performance.now();

                pressedBadge = null;
                pressedUIButton = null;
            }
            try {
                viewport.releasePointerCapture(e.pointerId);
            } catch (err) {}
        };

        viewport.addEventListener('pointerup', handlePointerUp);
        viewport.addEventListener('pointercancel', handlePointerUp);

        // Desktop Mouse Wheel zoom interface
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 0.1;
            const direction = e.deltaY < 0 ? 1 : -1;
            const nextScale = targetCameraScale + direction * zoomFactor;
            zoomToPoint(e.clientX, e.clientY, nextScale);
        }, { passive: false });

        // Mobile/Tablet Double Tap toggle: zoom relative to device profile
        let lastTapTime = 0;
        viewport.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.ui-button')) return;
            const currentTime = new Date().getTime();
            const tapDelay = currentTime - lastTapTime;
            if (tapDelay < 300 && tapDelay > 0) {
                handleDoubleTap(e.clientX, e.clientY);
                e.preventDefault();
            }
            lastTapTime = currentTime;
        });

        function handleDoubleTap(x, y) {
            const isMobile = window.innerWidth <= 768;
            const baseScale = isMobile ? 1.25 : 1.0;
            const zoomScale = isMobile ? 1.8 : 1.8;

            if (targetCameraScale > baseScale + 0.1) {
                zoomToPoint(x, y, baseScale);
            } else {
                zoomToPoint(x, y, zoomScale);
            }
        }

        // --- ANIMATION INTERPOLATION RENDERING LOOP ---
        function renderLoop() {
            const scaledW = mapW * targetCameraScale;
            const scaledH = mapH * targetCameraScale;

            if (!isPointerDown && (scaledW > viewW || scaledH > viewH)) {
                if (Math.abs(vx) > 0.01 || Math.abs(vy) > 0.01) {
                    targetCameraX += vx * 16; 
                    targetCameraY += vy * 16;
                    vx *= 0.88; 
                    vy *= 0.88;
                    clampBounds();
                } else {
                    vx = 0;
                    vy = 0;
                }
            }

            currentCameraScale = lerp(currentCameraScale, targetCameraScale, 0.15);
            currentCameraX = lerp(currentCameraX, targetCameraX, 0.15);
            currentCameraY = lerp(currentCameraY, targetCameraY, 0.15);

            mapContainer.style.transform = `translate3d(${currentCameraX}px, ${currentCameraY}px, 0) scale(${currentCameraScale})`;

            requestAnimationFrame(renderLoop);
        }

        // Run animation loop
        requestAnimationFrame(renderLoop);

        // --- BADGE GENERATION PIPELINE ---
        function generateBadges() {
            const overlay = document.getElementById('interactiveOverlay');
            
            BADGES.forEach(badge => {
                const el = document.createElement('div');
                el.className = 'mission-badge';
                el.style.left = `${badge.x}%`;
                el.style.top = `${badge.y}%`;
                el.setAttribute('data-level', badge.id);
                
                const img = document.createElement('img');
                img.src = badge.image;
                img.alt = `Level ${badge.id}`;
                img.className = 'badge-img';
                
                const shine = document.createElement('div');
                shine.className = 'shine-sweep';
                
                el.appendChild(img);
                el.appendChild(shine);
                
                overlay.appendChild(el);
            });
        }

        // --- ASSETS PRELOADER ENGINE ---
        function preloadAssets(assets, onProgress) {
            let loadedCount = 0;
            const total = assets.length;
            
            if (total === 0) return Promise.resolve();

            return Promise.all(assets.map(src => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = src;
                    img.onload = () => {
                        loadedCount++;
                        onProgress(loadedCount, total);
                        resolve();
                    };
                    img.onerror = () => {
                        // Resilient asset error recovery prevents layout blocks
                        loadedCount++;
                        onProgress(loadedCount, total);
                        resolve();
                    };
                });
            }));
        }

        // Handle completed assets state cleanly
        function onLoadingFinished() {
            const loadingScreen = document.getElementById('loadingScreen');
            const gameViewport = document.getElementById('gameViewport');

            // Generate map nodes on cached assets
            generateBadges();

            // Set cached map layout artwork
            mapImage.src = 'map.png';

            // Stabilize initial container dimensions
            updateMapDimensions();

            // Fade in the layout seamlessly
            gameViewport.style.opacity = '1';
            loadingScreen.classList.add('fade-out');
        }

        // Initialize Loading pipeline
        window.addEventListener('DOMContentLoaded', () => {
            const progressBarFill = document.getElementById('progressBarFill');
            const loadingPercentage = document.getElementById('loadingPercentage');

            preloadAssets(ASSETS, (loaded, total) => {
                const percent = Math.round((loaded / total) * 100);
                progressBarFill.style.width = `${percent}%`;
                loadingPercentage.textContent = `${percent}%`;
            }).then(() => {
                // Symmetrical fadeout delay
                setTimeout(onLoadingFinished, 500);
            });
        });

        // --- PWA SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered inside game scope:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
