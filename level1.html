<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle, #1a2230 0%, #080b11 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 60px;
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 400px;
        }
        h1 {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        p {
            color: #8a9fc4;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700 0%, #cca100 100%);
            color: #0b0d10;
            text-decoration: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 25px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LEVEL 1</h1>
        <p>Welcome to the first battle arena!</p>
        <a href="index.html" class="back-btn">Back to Map</a>
    </div>
</body>
</html>
